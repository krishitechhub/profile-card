<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Profile Card</title>

    <link rel="stylesheet" href="stylee.css">
</head>

<body>

    <div class="card">

        <div class="top"></div>

        <div class="content">

            <div class="profile"></div>

            <h2>Shah Krishi</h2>

            <p class="role">Computer Engineering Student</p>

            <p class="about">
                Passionate about Web Development, DSA, GATE Preparation and AI/ML.
                <br>
                Currently learning CSS and building real-world projects.
            </p>

            <div class="skills">
                <span>HTML</span>
                <span>CSS</span>
                <span>DSA</span>
                <span>GATE</span>
            </div>

            <div class="stats">

                <div class="box">
                    <h3>5+</h3>
                    <p>Projects</p>
                </div>

                <div class="box">
                    <h3>100%</h3>
                    <p>Learning</p>
                </div>

                <div class="box">
                    <h3>2028</h3>
                    <p>Graduate</p>
                </div>

            </div>

            <div class="buttons">
                <button class="follow">Follow</button>
                <button class="message">Contact</button>
            </div>

        </div>

    </div>

</body>
</html>
